freq: 1min
data_dir: ../Graph_Neural_Network_for_Market_Microstructure/dataset
artifact_root: art_multigraph
model_pipeline: multigraph  # set to memorygraph to run models/base_gnn_pipeline.py via train.py
split_file: ""
local_run: false
assets:
- ADA
- BTC
- ETH
target_asset: ETH
data_slice_start_frac: 0.0
data_slice_end_frac: 0.9
final_holdout_frac: 0.1
horizon_minutes: 5
label_mode: triple_barrier
objective_mode: execution_aware
lookback_bars_by_freq:
  1sec: 3600
  1min: 30
  5min: 6
book_levels: 15
top_levels: 5
near_levels: 5
relation_windows_bars_by_freq:
  1sec:
  - 60
  - 300
  - 900
  1min:
  - 3
  - 7
  - 15
  5min:
  - 2
  - 3
  - 4
relation_lags_bars:
- 0
- 1
- 2
use_fisher_z_for_corr: true
num_train_folds: 4
train_min_frac: 0.5
val_window_frac: 0.12
test_window_frac: 0.12
purge_gap_extra_bars: 1
max_abs_node_feature: 6.0
max_abs_edge_feature: 5.0
scaler_quantile_low: 5.0
scaler_quantile_high: 95.0
graph_operator: dynamic_rel_conv
node_hidden_dim: 48
edge_hidden_dim: 24
target_hidden_dim: 64
node_temporal_layers: 3
edge_temporal_layers: 2
target_temporal_layers: 2
graph_layers: 2
temporal_kernel_size: 3
dropout: 0.2
fusion_hidden_dim: 24
architecture:
  graph_readout_mode: target_plus_attn_global
  graph_global_pool: &id001
  - mean
  - max
  use_target_global_attention: true
  edge_feature_mode: hybrid
  learned_pairwise_hidden_dim: 64
# used by models/base_gnn_pipeline.py / models/memorygraph_pipeline.py
base_gnn:
  default_adj_mode: prior
  default_temporal_operator: conv
  relation_fusion_mode: attention
  prior_strength: 1.0
  adaptive_rank: 16
  adaptive_scale: 1.0
  operator_candidates:
  - static_conv
  - prior_conv
  - adaptive_conv
  - static_mpnn
  - prior_mpnn
  - adaptive_mpnn
meta_labeling:
  enabled: true
  trade_label_requires_first_touch: true
  mask_timeout_for_direction: true
triple_barrier:
  pt_sl_mode: volatility_scaled
  upper_barrier_bps: 8.0
  lower_barrier_bps: 8.0
  vol_lookback_bars: 30
  vol_barrier_mult_up: 1.8
  vol_barrier_mult_down: 1.8
  min_barrier_bps: 4.0
  max_barrier_bps: 30.0
  vertical_barrier_use_horizon: true
batch_size: 64
epochs: 45
patience: 7
lr: 0.0003
weight_decay: 0.0005
grad_clip: 1.0
huber_beta: 0.0003
adj_l1_lambda: 0.0001
adj_prior_lambda: 0.0003
cost_bps_per_side: 1.0
trade_label_buffer_bps: 0.5
loss:
  loss_w_trade: 0.35
  loss_w_dir: 0.65
  loss_w_ret: 0.15
  loss_w_utility: 0.85
  loss_w_exit_type: 0.05
  loss_w_tte: 0.03
  utility_tanh_k: 1.8
  false_positive_penalty: 0.2
  timeout_penalty: 0.1
  execution_cost_multiplier: 1.0
  use_cost_in_label: true
thr_trade_grid:
- 0.5
- 0.54
- 0.58
- 0.62
- 0.66
- 0.7
thr_dir_grid:
- 0.5
- 0.53
- 0.56
- 0.6
- 0.64
- 0.68
min_validation_trades: 40
min_validation_coverage: 0.015
backtest:
  exit_mode: realized_event
  threshold_search_metric: composite
  allow_timeout_trades: true
operator_candidates:
- dynamic_rel_conv
- dynamic_edge_mpnn
run_full_operator_ablation: true
ablation_fast_mode: false
ablation_epochs: 12
ablation_patience: 4
seed: 1001
num_threads: 4
gcs_data_prefix: gs://hft_lob/data/raw
gcs_run_prefix: gs://hft_lob/runs/{run_id}
