# Usage codes:
# LR - linear regression
# Co - eth-only conv
# BG - base_gnn
# Mu - multigraph
# Me - memorygraph

freq: 1min  # Mu BG Me LR Co
data_dir: ../Graph_Neural_Network_for_Market_Microstructure/dataset  # Mu BG Me LR Co
artifact_root: art_multigraph  # Mu BG Me
model_pipeline: multigraph  # Mu BG Me LR Co
split_file: ""  # Mu BG Me LR Co
local_run: false  # Mu BG Me LR Co

assets:  # Mu BG Me
  - ADA
  - BTC
  - ETH
target_asset: ETH  # Mu BG Me

data_slice_start_frac: 0.0  # Mu BG Me LR Co
data_slice_end_frac: 0.9  # Mu BG Me LR Co
final_holdout_frac: 0.1  # Mu BG Me LR Co
horizon_minutes: 5  # Mu BG Me LR Co
label_mode: triple_barrier  # Mu BG Me LR Co
objective_mode: execution_aware  # Mu BG Me LR Co

lookback_bars_by_freq:  # Mu BG Me LR Co
  1sec: 3600
  1min: 30
  5min: 6

book_levels: 15  # Mu BG Me LR Co
top_levels: 5  # Mu BG Me LR Co
near_levels: 5  # Mu BG Me LR Co

relation_windows_bars_by_freq:  # Mu BG Me
  1sec:
    - 60
    - 300
    - 900
  1min:
    - 3
    - 7
    - 15
  5min:
    - 2
    - 3
    - 4
relation_lags_bars:  # Mu BG Me
  - 0
  - 1
  - 2
use_fisher_z_for_corr: true  # Mu BG Me

num_train_folds: 4  # Mu BG Me LR Co
train_min_frac: 0.5  # Mu BG Me LR Co
val_window_frac: 0.12  # Mu BG Me LR Co
test_window_frac: 0.12  # Mu BG Me LR Co
purge_gap_extra_bars: 1  # Mu BG Me LR Co

max_abs_node_feature: 6.0  # Mu BG Me LR Co
max_abs_edge_feature: 5.0  # Mu BG Me
scaler_quantile_low: 5.0  # Mu BG Me LR Co
scaler_quantile_high: 95.0  # Mu BG Me LR Co

graph_operator: dynamic_rel_conv  # Mu BG Me
node_hidden_dim: 48  # Mu BG Me
edge_hidden_dim: 24  # Mu BG Me
target_hidden_dim: 64  # Mu BG Me
node_temporal_layers: 3  # Mu BG
edge_temporal_layers: 2  # Mu BG
target_temporal_layers: 2  # Mu BG
graph_layers: 2  # Mu BG Me
temporal_kernel_size: 3  # Mu BG
dropout: 0.2  # Mu BG Me
fusion_hidden_dim: 24  # Mu BG Me

architecture:
  graph_readout_mode: target_plus_attn_global  # Mu BG Me
  graph_global_pool:  # Mu BG Me
    - mean
    - max
  use_target_global_attention: true  # Mu BG Me
  edge_feature_mode: hybrid  # Mu BG Me
  learned_pairwise_hidden_dim: 64  # Mu BG Me

memorygraph:
  default_operator: conv  # Me
  relation_fusion_mode: attention  # Me
  adjacency_rank: 16  # Me
  adjacency_scale: 1.0  # Me
  node_memory_dim: 48  # Me
  edge_memory_dim: 24  # Me
  memory_dropout: 0.2  # Me
  chunk_len: 96  # Me
  detach_interval: 96  # Me
  eval_chunk_len: 192  # Me
  calibration_frac: 0.4  # Me
  min_calibration_samples: 64  # Me
  vertical_barrier_bars: 5  # Me
  operator_candidates:  # Me
    - conv
    - mpnn

base_gnn:
  default_adj_mode: prior  # BG
  default_temporal_operator: conv  # BG
  relation_fusion_mode: attention  # BG
  prior_strength: 1.0  # BG
  adaptive_rank: 16  # BG
  adaptive_scale: 1.0  # BG
  operator_candidates:  # BG
    - static_conv
    - prior_conv
    - adaptive_conv
    - static_mpnn
    - prior_mpnn
    - adaptive_mpnn

eth_baseline:
  artifact_root: art_eth_baseline  # LR Co
  target_asset: ETH  # LR Co
  default_model: temporal_conv  # LR Co
  operator_candidates:  # LR Co
    - linear_regression
    - temporal_conv
  run_full_operator_ablation: true  # LR Co
  hidden_dim: 48  # Co
  temporal_layers: 3  # Co
  temporal_kernel_size: 3  # Co
  dropout: 0.15  # Co

meta_labeling:
  enabled: true  # Mu BG Me LR Co
  trade_label_requires_first_touch: true  # Mu BG Me LR Co
  mask_timeout_for_direction: true  # Mu BG Me LR Co

triple_barrier:
  pt_sl_mode: volatility_scaled  # Mu BG Me LR Co
  upper_barrier_bps: 8.0  # Mu BG Me LR Co
  lower_barrier_bps: 8.0  # Mu BG Me LR Co
  vol_lookback_bars: 30  # Mu BG Me LR Co
  vol_barrier_mult_up: 1.8  # Mu BG Me LR Co
  vol_barrier_mult_down: 1.8  # Mu BG Me LR Co
  min_barrier_bps: 4.0  # Mu BG Me LR Co
  max_barrier_bps: 30.0  # Mu BG Me LR Co
  vertical_barrier_use_horizon: true  # Mu BG Me LR Co

batch_size: 64  # Mu BG Me LR Co
epochs: 45  # Mu BG Me LR Co
patience: 7  # Mu BG Me LR Co
lr: 0.0003  # Mu BG Me LR Co
weight_decay: 0.0005  # Mu BG Me LR Co
grad_clip: 1.0  # Mu BG Me LR Co
huber_beta: 0.0003  # Mu BG Me LR Co
adj_l1_lambda: 0.0001  # Mu BG Me LR Co
adj_prior_lambda: 0.0003  # Mu BG LR Co
cost_bps_per_side: 1.0  # Mu BG Me LR Co
trade_label_buffer_bps: 0.5  # Mu BG Me LR Co

loss:
  loss_w_trade: 0.35  # Mu BG Me LR Co
  loss_w_dir: 0.65  # Mu BG Me LR Co
  loss_w_ret: 0.15  # Mu BG Me LR Co
  loss_w_utility: 0.85  # Mu BG Me LR Co
  loss_w_exit_type: 0.05  # Mu BG Me LR Co
  loss_w_tte: 0.03  # Mu BG Me LR Co
  utility_tanh_k: 1.8  # Mu BG Me LR Co
  false_positive_penalty: 0.2  # Mu BG Me LR Co
  timeout_penalty: 0.1  # Mu BG Me LR Co
  execution_cost_multiplier: 1.0  # Mu BG Me LR Co
  use_cost_in_label: true  # Mu BG Me LR Co

thr_trade_grid:  # Mu BG Me LR Co
  - 0.5
  - 0.54
  - 0.58
  - 0.62
  - 0.66
  - 0.7
thr_dir_grid:  # Mu BG Me LR Co
  - 0.5
  - 0.53
  - 0.56
  - 0.6
  - 0.64
  - 0.68
min_validation_trades: 40  # Mu BG Me LR Co
min_validation_coverage: 0.015  # Mu BG Me LR Co

backtest:
  exit_mode: realized_event  # Mu BG Me LR Co
  threshold_search_metric: composite  # Mu BG Me LR Co

operator_candidates:  # Mu BG Me
  - dynamic_rel_conv
  - dynamic_edge_mpnn
run_full_operator_ablation: true  # Mu BG Me
ablation_fast_mode: false  # Mu BG Me LR Co
ablation_epochs: 12  # Mu BG Me LR Co
ablation_patience: 4  # Mu BG Me LR Co

